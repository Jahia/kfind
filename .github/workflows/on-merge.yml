# Triggered on every push to main — builds the module and uploads the JAR as a
# workflow artifact (90-day retention) so it can be retrieved without a release.
name: On Merge to Main

on:
  push:
    branches:
      - main
    tags-ignore:
      - "**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & publish snapshot artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Set up Node LTS
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Enable corepack (Yarn 4)
        run: corepack enable

      - name: Cache Yarn dependencies
        uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-

      - name: Build (mvn clean install)
        run: mvn --batch-mode clean install -s .github/maven-settings.xml

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Upload snapshot JAR
        uses: actions/upload-artifact@v4
        with:
          name: kfind-snapshot-${{ github.sha }}
          path: target/*.jar
          retention-days: 90
