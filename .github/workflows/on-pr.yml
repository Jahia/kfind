name: On PR

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  actions: read
  checks: write
  contents: read
  id-token: write

jobs:
  build:
    name: Build module
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/jahia/jahia-docker-mvn-cache:11-jdk-noble-mvn-loaded
      credentials:
        username: ${{ secrets.GH_PACKAGES_USERNAME }}
        password: ${{ secrets.GH_PACKAGES_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - uses: jahia/jahia-modules-action/build@v2
        with:
          mvn_settings_filepath: .github/maven.settings.xml
          nexus_username: ${{ secrets.NEXUS_USERNAME }}
          nexus_password: ${{ secrets.NEXUS_PASSWORD }}
          tests_module_type: disabled

  integration-tests:
    name: Integration Tests
    needs: build
    uses: Jahia/jahia-modules-action/.github/workflows/reusable-integration-tests.yml@v2
    secrets: inherit
    with:
      module_id: kfind
      module_branch: ${{ github.ref }}
      jahia_image: ghcr.io/jahia/jahia-ee-dev:8-SNAPSHOT
      provisioning_manifest: provisioning-manifest-build.yml
      artifact_prefix: kfind-artifacts
      should_use_build_artifacts: true
      should_skip_testrail: true
      pagerduty_skip_notification: true
